<div class="h-full overflow-y-auto p-6 lg:p-8">

  <h1 class="text-3xl font-black text-slate-900">
    Create Lead
  </h1>

  <p class="mt-2 text-slate-500">
    Add new lead information
  </p>

  <form class="mt-10 space-y-6">

    <div class="grid gap-6 lg:grid-cols-2">

      <div>

        <label class="mb-2 block text-sm font-semibold text-slate-700">
          Full Name
        </label>

        <input
          type="text"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10"
        />

      </div>

      <div>

        <label class="mb-2 block text-sm font-semibold text-slate-700">
          Company
        </label>

        <input
          type="text"
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10"
        />

      </div>

    </div>

  </form>

</div>
