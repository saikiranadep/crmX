<div class="flex h-full flex-col">

  <!-- HEADER -->
  <div
    class="border-b border-slate-200 p-5"
  >

    <div class="flex items-center justify-between">

      <div>

        <h2 class="text-2xl font-black text-slate-900">
          Leads
        </h2>

        <p class="mt-1 text-sm text-slate-500">
          Manage customer pipeline
        </p>

      </div>

      <button
        (click)="createLead()"
        class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition focus:outline-none focus:ring-2 focus:ring-blue-500/30"
        title="Create"
      >
        +
      </button>

    </div>

    <!-- SEARCH -->
    <div class="mt-5">

      <input
        type="text"
        placeholder="Search leads..."
        class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-4 text-slate-900 outline-none transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10"
      />

    </div>

  </div>

  <!-- LIST -->
  <div class="flex-1 overflow-y-auto">

    @for (
      lead of leadsService.leads();
      track lead.id
    ) {

      <button
        (click)="openLead(lead.id)"
        class="flex w-full items-start gap-4 border-b border-slate-100 p-5 text-left transition hover:bg-slate-50"
      >

        <!-- AVATAR -->
        <div
          class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-900 via-blue-700 to-cyan-500 font-bold text-white"
        >
          {{ lead.fullName.charAt(0) }}
        </div>

        <!-- CONTENT -->
        <div class="min-w-0 flex-1">

          <div class="flex items-center justify-between gap-3">

            <h3 class="truncate font-bold text-slate-900">
              {{ lead.fullName }}
            </h3>

            <span
              class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700"
            >
              {{ lead.status }}
            </span>

          </div>

          <p class="mt-1 text-sm text-slate-500">
            {{ lead.company }}
          </p>

          <!-- <p class="mt-2 truncate text-sm text-slate-400">
            {{ lead.email }}
          </p> -->
          <p class="mt-2 truncate text-sm text-slate-400">
            {{ lead.createdAt | date:'dd MMM yyyy' }}
        </p>

        </div>

      </button>

    }

  </div>

</div>
