<div class="flex h-screen overflow-hidden bg-[#f4f7fb]">

  <!-- MOBILE OVERLAY -->
  @if (sidebarOpen()) {

    <div
      class="fixed inset-0 z-40 bg-black/40 lg:hidden"
      (click)="closeSidebar()"
    ></div>

  }

  <!-- MOBILE SIDEBAR -->
  <div
    class="fixed left-0 top-0 z-50 h-full transform transition-transform duration-300 lg:hidden"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()"
  >

    <app-sidebar
      [collapsed]="false"
      (closeSidebar)="closeSidebar()"
    />

  </div>

  <!-- DESKTOP SIDEBAR -->
  <div class="hidden lg:block">

    <app-sidebar
      [collapsed]="sidebarCollapsed()"
      (toggleCollapse)="toggleCollapse()"
    />

  </div>

  <!-- MAIN -->
  <div class="flex flex-1 flex-col overflow-hidden">

    <app-header
      (menuClick)="toggleSidebar()"
    />

    <main
      class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8"
    >

      <router-outlet />

    </main>

  </div>

</div>
