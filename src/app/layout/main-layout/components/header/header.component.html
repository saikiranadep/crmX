<header
  class="flex h-20 items-center justify-between border-b border-slate-200 bg-white px-4 sm:px-6 lg:px-8"
>

  <!-- LEFT -->
  <div class="flex items-center gap-4">

    <!-- MOBILE MENU -->
    <button
      class="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-100 text-xl lg:hidden"
      (click)="menuClick.emit()"
    >
      ☰
    </button>

    <!-- TITLE + BREADCRUMB -->
      <div
  class="mt-1 flex flex-wrap items-center gap-2 text-sm text-slate-500"
>

  @for (
    item of breadcrumbs;
    track $index
  ) {

    <!-- HOME -->
    @if ($index === 0) {

      <a
        routerLink="/app/home"
        class="transition hover:text-slate-700 hover:underline"
      >
        {{ item }}
      </a>

    }

    <!-- OTHER -->
    @else {

      <span>/</span>

      <span
        class="font-semibold text-slate-700"
      >
        {{ item }}
      </span>

    }

  }

</div>

  </div>

  <!-- RIGHT -->
  <div class="relative">

    <!-- USER BUTTON -->
    <button
      (click)="toggleProfileMenu()"
      class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white px-3 py-2 transition-all duration-300 hover:bg-slate-50"
    >

      <!-- USER INFO -->
      <div class="hidden text-right sm:block">

        <h4 class="font-bold text-slate-900">
          Admin
        </h4>

        <p class="text-sm text-slate-500">
          Super Admin
        </p>

      </div>

      <!-- AVATAR -->
      <div
        class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-900 via-blue-700 to-cyan-500 font-bold text-white sm:h-12 sm:w-12"
      >
        A
      </div>

    </button>

    <!-- DROPDOWN -->
    @if (profileMenuOpen()) {

      <div
        class="absolute right-0 top-16 z-50 w-64 rounded-3xl border border-slate-200 bg-white p-3 shadow-[0_20px_60px_rgba(15,23,42,0.12)]"
      >

        <!-- PROFILE -->
        <!-- <div
          class="flex items-center gap-3 rounded-2xl bg-slate-50 p-4"
        >

          <div
            class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-900 via-blue-700 to-cyan-500 font-bold text-white"
          >
            A
          </div>

          <div>

            <h3 class="font-bold text-slate-900">
              Admin
            </h3>

            <p class="text-sm text-slate-500">
              admin@crmx.com
            </p>

          </div>

        </div> -->

        <!-- MENU -->
        <div class="mt-3 space-y-1">

          <button
            class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-slate-700 transition hover:bg-slate-100"
          >
            <span>
              👤
            </span>

            <span class="font-medium">
              My Profile
            </span>
          </button>

          <button
            class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-slate-700 transition hover:bg-slate-100"
          >
            <span>
              ⚙️
            </span>

            <span class="font-medium">
              Settings
            </span>
          </button>

          <div class="my-2 border-t border-slate-100"></div>

          <!-- LOGOUT -->
          <button
            (click)="logout()"
            class="flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-red-600 transition hover:bg-red-50"
          >

            <span>
              🚪
            </span>

            <span class="font-semibold">
              Logout
            </span>

          </button>

        </div>

      </div>

    }

  </div>

</header>
