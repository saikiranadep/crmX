<aside
  class="flex h-full flex-col overflow-hidden border-r border-slate-200 bg-white transition-[width] duration-300 ease-in-out"
  [class.w-72]="!collapsed"
  [class.w-24]="collapsed"
>

  <!-- TOP -->
  <div
    class="flex h-20 items-center justify-between border-b border-slate-100 px-4"
  >

    <!-- LOGO -->
    <div class="flex items-center gap-3">

      <div
        class="flex items-center justify-center rounded-2xl bg-gradient-to-br from-slate-900 via-blue-700 to-cyan-500 font-black text-white shadow-md transition-all duration-300"
        [class.h-14]="!collapsed"
        [class.w-36]="!collapsed"
        [class.text-lg]="!collapsed"
        [class.h-12]="collapsed"
        [class.w-12]="collapsed"
        [class.text-xl]="collapsed"
      >
        {{ collapsed ? 'X' : 'crmX' }}
      </div>

      @if (!collapsed) {

        <div>

          <!-- OPTIONAL CONTENT -->

        </div>

      }

    </div>

    <!-- DESKTOP COLLAPSE -->
    <!-- <button
      class="hidden rounded-xl bg-slate-100 p-2 text-sm transition hover:bg-slate-200 lg:block"
      (click)="toggleCollapse.emit()"
    >
      {{ collapsed ? '➡️' : '⬅️' }}
    </button> -->
    <button
      class="hidden rounded-xl bg-slate-100 p-2 text-sm transition hover:bg-slate-200 lg:block"
      (click)="toggleCollapse.emit()"
    >
      {{ collapsed ? '→' : '←' }}
    </button>
    <!-- MOBILE CLOSE -->
    <button
      class="rounded-xl bg-slate-100 p-2 transition hover:bg-slate-200 lg:hidden"
      (click)="closeSidebar.emit()"
    >
      ✕
    </button>

  </div>

  <!-- MENU -->
  <nav class="flex-1 overflow-y-auto px-3 py-6">

    <div class="space-y-2">

      <!-- LEADS -->
      <a
        routerLink="/app/leads"
        routerLinkActive="bg-slate-100 text-black shadow-md ring-1 ring-white/10"
        class="flex items-center rounded-xl px-4 py-3 text-slate-600 transition-all duration-300 hover:bg-slate-100 hover:text-slate-900"
        [class.justify-center]="collapsed"
        [class.gap-2]="!collapsed"
      >

        <span class="text-lg">
          💼
        </span>

        @if (!collapsed) {

          <span class="font-semibold">
            Leads
          </span>

        }

      </a>

      <!-- DASHBOARD -->
      <a
        routerLink="/app/dashboard"
        routerLinkActive="bg-slate-200 text-black shadow-md ring-1 ring-white/10"
        class="flex items-center rounded-xl px-4 py-3 text-slate-600 transition-all duration-300 hover:bg-slate-100 hover:text-slate-900"
        [class.justify-center]="collapsed"
        [class.gap-2]="!collapsed"
      >

        <span class="text-lg">
          📊
        </span>

        @if (!collapsed) {

          <span class="font-semibold">
            Dashboard
          </span>

        }

      </a>

      <!-- CUSTOMERS -->
      <a
        routerLink="/app/customers"
        routerLinkActive="bg-slate-200 text-black shadow-md ring-1 ring-white/10"
        class="flex items-center rounded-xl px-4 py-3 text-slate-600 transition-all duration-300 hover:bg-slate-100 hover:text-slate-900"
        [class.justify-center]="collapsed"
        [class.gap-2]="!collapsed"
      >

        <span class="text-lg">
          👥
        </span>

        @if (!collapsed) {

          <span class="font-semibold">
            Customers
          </span>

        }

      </a>

    </div>

  </nav>

</aside>
